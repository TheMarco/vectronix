    // --- Bootstrap ---
    const container = document.getElementById('game-container');

    // Calculate best integer scale
    function calcScale() {
      const maxW = window.innerWidth - 16;
      const maxH = window.innerHeight - 16;
      return Math.max(1, Math.min(Math.floor(maxW / 128), Math.floor(maxH / 128)));
    }

    let scale = calcScale();
    const cvs = P8.init(container, scale);

    window.addEventListener('resize', () => {
      const newScale = calcScale();
      if (newScale !== scale) {
        scale = newScale;
        cvs.style.width = (128 * scale) + 'px';
        cvs.style.height = (128 * scale) + 'px';
      }
    });

    // Load spritesheet
    P8.loadSpriteSheet(GFX_DATA);

    // Mobile: touch position controls movement, auto-fire is always on
    const isMobile = matchMedia('(hover: none) and (pointer: coarse)').matches;
    const touchZone = document.getElementById('touch-zone');
    container.appendChild(touchZone); // move inside container so it overlays canvas

    let touchActive = false;
    let touchX = 0.5; // 0..1 normalized x position
    let mobileTapped = false;

    touchZone.addEventListener('touchstart', e => {
      e.preventDefault();
      touchActive = true;
      mobileTapped = true;
      const t = e.touches[0];
      const rect = cvs.getBoundingClientRect();
      touchX = (t.clientX - rect.left) / rect.width;
    });
    touchZone.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      const rect = cvs.getBoundingClientRect();
      touchX = (t.clientX - rect.left) / rect.width;
    });
    touchZone.addEventListener('touchend', e => {
      e.preventDefault();
      touchActive = false;
    });
    touchZone.addEventListener('touchcancel', e => {
      touchActive = false;
    });

    // Expose mobile state to game code
    window.MOBILE = isMobile;
    window.mobileTouch = () => ({ active: touchActive, x: touchX });
    window.consumeMobileTap = () => { const t = mobileTapped; mobileTapped = false; return t; };

    // Ensure audio context on first user gesture (browsers require interaction)
    function ensureAudio() {
      P8Sound.ensureAudioCtx();
      window.removeEventListener('keydown', ensureAudio);
      window.removeEventListener('click', ensureAudio);
      window.removeEventListener('touchstart', ensureAudio);
    }
    window.addEventListener('keydown', ensureAudio);
    window.addEventListener('click', ensureAudio);
    window.addEventListener('touchstart', ensureAudio);

    // Auto-start game immediately
    _init();
    requestAnimationFrame(gameLoop);

    // Game loop at 30fps (PICO-8 default)
    const FRAME_TIME = 1000 / 30;
    let lastTime = 0;
    let accumulator = 0;
    let loopStarted = false;

    function gameLoop(timestamp) {
      if (!loopStarted) { lastTime = timestamp; loopStarted = true; }
      const delta = timestamp - lastTime;
      lastTime = timestamp;
      accumulator += delta;

      // Cap accumulator to prevent spiral of death
      if (accumulator > FRAME_TIME * 4) accumulator = FRAME_TIME * 4;

      while (accumulator >= FRAME_TIME) {
        _update();
        P8.updateInput();
        accumulator -= FRAME_TIME;
      }

      _draw();
      P8.flip();
      requestAnimationFrame(gameLoop);
    }
  </script>
